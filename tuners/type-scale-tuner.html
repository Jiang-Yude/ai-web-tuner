<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>字級校稿器 · AI 網頁微調術</title>
<style>
  *{box-sizing:border-box}
  body{font-family:-apple-system,"PingFang TC","Noto Sans TC",sans-serif;background:#f5f0e8;padding:40px 24px;color:#2b2a26}
  .wrap{max-width:1040px;margin:0 auto}
  h1{font-size:26px;letter-spacing:1px}
  .sub{margin-top:8px;color:#7a7264;font-size:15px;margin-bottom:24px}
  .toolbar{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap}
  .toolbar button{background:#fbf5e4;border:1px solid #c9a961;color:#5a4a3a;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:14px}
  .toolbar button.on{background:#c9a961;color:#fff}
  .layout{display:flex;gap:30px;align-items:flex-start;flex-wrap:wrap}
  .stage{flex:1;min-width:300px}
  .device{margin:0 auto;background:#fff;border:1px solid #e0d6c0;border-radius:16px;box-shadow:0 6px 24px rgba(43,42,38,.08);overflow:hidden;transition:max-width .25s}
  .device.desktop{max-width:100%}
  .device.mobile{max-width:380px}
  .hero{padding:48px 32px;background:linear-gradient(180deg,#fffcf0,#f3e7d0)}
  .hero h2{line-height:1.1;margin:0;color:#2b2a26;overflow-wrap:anywhere}
  .hero .subt{display:block;color:#7a5c3a;margin-top:8px;font-weight:500}
  .controls{background:#fff;border:1px solid #e0d6c0;border-radius:16px;padding:24px;min-width:320px}
  .row{margin-bottom:16px}
  .lab{font-size:13px;color:#5a4a3a;margin-bottom:6px;display:flex;justify-content:space-between}
  .lab .val{font-family:monospace;color:#8B6508;font-weight:700}
  input[type=range]{width:100%;accent-color:#c9a961}
  .css-out{background:#2b2a26;color:#fbf5e4;border-radius:8px;padding:12px 14px;font-family:monospace;font-size:12px;line-height:1.6;white-space:pre-wrap;margin-top:14px;user-select:all}
  .copy{background:#c9a961;color:#fff;border:none;padding:9px 16px;border-radius:7px;font-weight:600;cursor:pointer;margin-top:10px}
  .copy.done{background:#a9863f}
  .hint{font-size:12px;color:#9a8f7c;margin-top:8px;line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
  <h1>字級校稿器</h1>
  <p class="sub">標題桌機好看、手機爆三行的時候用。切換桌機手機與中英文，把兩級標題調到都好看，複製 clamp() 貼回。</p>
  <div class="toolbar">
    <button data-dev="desktop" class="on">桌機預覽</button>
    <button data-dev="mobile">手機預覽</button>
    <span style="width:14px"></span>
    <button data-lang="zh" class="on">中文</button>
    <button data-lang="en">English</button>
  </div>
  <div class="layout">
    <div class="stage">
      <div class="device desktop" id="device">
        <div class="hero"><h2><span id="main">把你的網站調到剛剛好</span><span class="subt" id="sub">2026 年度版</span></h2></div>
      </div>
    </div>
    <div class="controls">
      <div class="row"><div class="lab">大標 桌機字級 <span class="val" id="m1v">56px</span></div><input type="range" id="m1" min="24" max="96" value="56"></div>
      <div class="row"><div class="lab">副標 桌機字級 <span class="val" id="s1v">28px</span></div><input type="range" id="s1" min="14" max="60" value="28"></div>
      <div class="row"><div class="lab">手機縮放比 <span class="val" id="rv">62%</span></div><input type="range" id="ratio" min="40" max="90" value="62"></div>
      <div class="css-out" id="out"></div>
      <button class="copy" id="copy">複製 CSS</button>
      <div class="hint">clamp() 的最小值＝桌機字級 × 手機縮放比，中間用 vw 平滑過渡。切到手機預覽看會不會爆行。</div>
    </div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const TXT={zh:{main:"把你的網站調到剛剛好",sub:"2026 年度版"},en:{main:"Tune Your Website to Just Right",sub:"2026 Annual Edition"}};
let dev="desktop",lang="zh",m1=56,s1=28,ratio=62;
function clampStr(px){const min=Math.round(px*ratio/100);const vw=(px/7.2).toFixed(1);return `clamp(${min}px, ${vw}vw, ${px}px)`;}
function apply(){
  m1=+$('m1').value;s1=+$('s1').value;ratio=+$('ratio').value;
  $('m1v').textContent=m1+'px';$('s1v').textContent=s1+'px';$('rv').textContent=ratio+'%';
  const mc=clampStr(m1),sc=clampStr(s1);
  $('main').style.fontSize=dev==='mobile'?Math.round(m1*ratio/100)+'px':m1+'px';
  $('sub').style.fontSize=dev==='mobile'?Math.round(s1*ratio/100)+'px':s1+'px';
  $('main').textContent=TXT[lang].main;$('sub').textContent=TXT[lang].sub;
  $('out').textContent=`.hero h2 { font-size: ${mc}; }\n.hero .subt { font-size: ${sc}; }`;
}
['m1','s1','ratio'].forEach(k=>$(k).oninput=apply);
document.querySelectorAll('[data-dev]').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('[data-dev]').forEach(x=>x.classList.remove('on'));b.classList.add('on');
  dev=b.dataset.dev;$('device').className='device '+dev;apply();
});
document.querySelectorAll('[data-lang]').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('[data-lang]').forEach(x=>x.classList.remove('on'));b.classList.add('on');
  lang=b.dataset.lang;apply();
});
$('copy').onclick=()=>{navigator.clipboard.writeText($('out').textContent);const b=$('copy');b.textContent='已複製 ✓';b.classList.add('done');setTimeout(()=>{b.textContent='複製 CSS';b.classList.remove('done')},1200);};
apply();
</script>
</body>
</html>
