<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光暈校稿器 · AI 網頁微調術</title>
<style>
  *{box-sizing:border-box}
  body{font-family:-apple-system,"PingFang TC","Noto Sans TC",sans-serif;background:#f5f0e8;padding:40px 24px;color:#2b2a26}
  .wrap{max-width:1060px;margin:0 auto}
  h1{font-size:26px;letter-spacing:1px}
  .sub{margin-top:8px;color:#7a7264;font-size:15px;margin-bottom:24px}
  .layout{display:flex;gap:30px;align-items:flex-start;flex-wrap:wrap}
  .stage{flex:1;min-width:320px}
  .demo{position:relative;height:340px;border-radius:16px;overflow:hidden;background:#fffaf2;border:1px solid #e0d6c0;display:flex;align-items:center;justify-content:center;cursor:crosshair}
  .demo::after{content:'';position:absolute;inset:0;background:radial-gradient(var(--r,360px) circle at var(--mx,50%) var(--my,50%),var(--glow),transparent 72%);pointer-events:none;mix-blend-mode:var(--blend,multiply)}
  .demo .label{position:relative;z-index:2;color:#5a4a3a;font-size:15px;text-align:center;line-height:1.7}
  .controls{background:#fff;border:1px solid #e0d6c0;border-radius:16px;padding:24px;min-width:320px}
  .cards{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
  .cards span{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2)}
  .row{margin-bottom:14px}
  .lab{font-size:13px;color:#5a4a3a;margin-bottom:6px;display:flex;justify-content:space-between}
  .lab .val{font-family:monospace;color:#8B6508;font-weight:700}
  input[type=range]{width:100%;accent-color:#c9a961}
  select{padding:6px 10px;border:1px solid #e0d6c0;border-radius:7px;font-size:13px}
  .css-out{background:#2b2a26;color:#fbf5e4;border-radius:8px;padding:12px 14px;font-family:monospace;font-size:11.5px;line-height:1.6;white-space:pre-wrap;margin-top:14px;user-select:all}
  .copy{background:#c9a961;color:#fff;border:none;padding:9px 16px;border-radius:7px;font-weight:600;cursor:pointer;margin-top:10px}
  .copy.done{background:#a9863f}
</style>
</head>
<body>
<div class="wrap">
  <h1>光暈校稿器</h1>
  <p class="sub">滑鼠光暈、區塊光斑、accent 色太強或太淡的時候用。在預覽區移動滑鼠看效果，調色與強度，複製 CSS。</p>
  <div class="layout">
    <div class="stage">
      <div class="demo" id="demo"><div class="label">在這個區塊裡<br>移動滑鼠看光暈跟著走</div></div>
    </div>
    <div class="controls">
      <div class="cards" id="cards"></div>
      <div class="row"><div class="lab">色相 H <span class="val" id="hv">35</span></div><input type="range" id="h" min="0" max="360" value="35"></div>
      <div class="row"><div class="lab">飽和 S <span class="val" id="sv">50</span></div><input type="range" id="s" min="0" max="100" value="50"></div>
      <div class="row"><div class="lab">明度 L <span class="val" id="lv">60</span></div><input type="range" id="l" min="0" max="100" value="60"></div>
      <div class="row"><div class="lab">透明度 <span class="val" id="av">0.15</span></div><input type="range" id="a" min="0" max="60" value="15"></div>
      <div class="row"><div class="lab">半徑 <span class="val" id="rv">360px</span></div><input type="range" id="r" min="120" max="700" value="360" step="10"></div>
      <div class="row"><div class="lab">混合模式 <span></span></div>
        <select id="blend"><option>multiply</option><option>normal</option><option>screen</option><option>overlay</option><option>soft-light</option></select></div>
      <div class="css-out" id="out"></div>
      <button class="copy" id="copy">複製 CSS</button>
    </div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const PRESETS=[[35,50,60],[28,60,55],[150,40,52],[210,45,55],[280,35,58],[0,0,30]];
let h=35,s=50,l=60,a=15,r=360,blend='multiply';
function glow(){return `hsla(${h},${s}%,${l}%,${(a/100).toFixed(2)})`;}
function apply(){
  h=+$('h').value;s=+$('s').value;l=+$('l').value;a=+$('a').value;r=+$('r').value;blend=$('blend').value;
  $('hv').textContent=h;$('sv').textContent=s;$('lv').textContent=l;$('av').textContent=(a/100).toFixed(2);$('rv').textContent=r+'px';
  const d=$('demo');d.style.setProperty('--glow',glow());d.style.setProperty('--r',r+'px');d.style.setProperty('--blend',blend);
  $('out').textContent=`/* 套在容器的 ::after */\nbackground: radial-gradient(${r}px circle\n  at var(--mx,50%) var(--my,50%),\n  ${glow()}, transparent 72%);\nmix-blend-mode: ${blend};`;
}
['h','s','l','a','r'].forEach(k=>$(k).oninput=apply);
$('blend').onchange=apply;
const cards=$('cards');
PRESETS.forEach(p=>{const sp=document.createElement('span');sp.style.background=`hsl(${p[0]},${p[1]}%,${p[2]}%)`;
  sp.onclick=()=>{$('h').value=p[0];$('s').value=p[1];$('l').value=p[2];apply();};cards.appendChild(sp);});
$('demo').addEventListener('mousemove',e=>{const rect=$('demo').getBoundingClientRect();
  $('demo').style.setProperty('--mx',((e.clientX-rect.left)/rect.width*100)+'%');
  $('demo').style.setProperty('--my',((e.clientY-rect.top)/rect.height*100)+'%');});
$('copy').onclick=()=>{navigator.clipboard.writeText($('out').textContent);const b=$('copy');b.textContent='已複製 ✓';b.classList.add('done');setTimeout(()=>{b.textContent='複製 CSS';b.classList.remove('done')},1200);};
apply();
</script>
</body>
</html>
